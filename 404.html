<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://j-s-yt.github.io/J-S-Y/link/jose.ico" type="image/x-icon" />
    <meta name="google-adsense-account" content="ca-pub-8906506021952813" />
    <title>JSY H3NT4I 404</title>

    <style>
        /* ===== RESET BÁSICO ===== */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* ===== MENU ===== */
        .menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a1a1a;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #ff4757;
        }

        .logo a {
            color: inherit;
            text-decoration: none;
        }

        .menu-links {
            display: flex;
            list-style: none;
            gap: 15px;
            margin: 0;
            padding: 0;
        }

        .menu-links li a {
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            transition: color 0.3s;
        }

        .menu-links li a:hover {
            color: #1dd1a1;
        }

        .menu-toggle {
            display: none;
            font-size: 26px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .menu-links {
                display: none;
                flex-direction: column;
                background-color: #1a1a1a;
                position: absolute;
                top: 60px;
                right: 20px;
                width: 170px;
                padding: 10px;
                border-radius: 8px;
                box-shadow: 0 0 10px #000;
            }

            .menu-links.active {
                display: flex;
            }
        }

        /* ===== CONTEÚDO 404 ===== */
        .page-wrapper {
            min-height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
        }

        h1 {
            font-size: 64px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 40px;
        }

        a.button {
            display: inline-block;
            text-decoration: none;
            background-color: #007bff;
            color: #fff;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 18px;
            transition: 0.3s;
        }

        a.button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="menu">
            <div class="logo">
                <a href="/">JSY H3NT4I</a>
            </div>
            <div class="menu-toggle" id="menu-toggle">&#9776;</div>
            <ul class="menu-links" id="menu-links">
                <li><a href="/">Início</a></li>
                <li><a href="Lançamentos.html">Lançamentos</a></li>
                <li><a href="lista-anime.html">Lista de Anime</a></li>
                <li><a href="Pedido-de-Anime.html">Pedido de Anime</a></li>
            </ul>
        </nav>
    </header>

    <!-- ===== 404 ===== -->
    <div class="page-wrapper">
        <div class="container">
            <h1>404</h1>
            <p>Oops! A página que você procura não foi encontrada.</p>
            <a id="backButton" href="#" class="button">Voltar</a>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
        // Menu mobile
        document.getElementById("menu-toggle").onclick = () => {
            document.getElementById("menu-links").classList.toggle("active");
        };

        // Botão voltar inteligente
        const referrer = document.referrer;
        const backButton = document.getElementById("backButton");

        if (!referrer || referrer === window.location.href) {
            backButton.textContent = "Voltar para a Página Inicial";
            backButton.href = "https://j-s-h3.github.io/#erro";
        } else {
            backButton.textContent = "Voltar para a página anterior";
            backButton.addEventListener("click", function (e) {
                e.preventDefault();
                history.back();
            });
        }

        // Recarregar a cada 1 minuto
        setTimeout(() => {
            location.reload();
        }, 60000);
    </script>

</body>
</html>
